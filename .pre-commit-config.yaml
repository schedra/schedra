files: '.*\.py'

repos:
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
      - id: add-trailing-comma

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: double-quote-string-fixer
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/python-poetry/poetry
    rev: '2.1.2'
    hooks:
      - id: poetry-check
        args: ["--directory=app/backend"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.15.0'
    hooks:
      - id: mypy
        name: mypy
        args: ["--config-file=app/backend/pyproject.toml"]

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'cd app/backend && poetry run ruff check . --fix --force-exclude'
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: bash -c 'cd app/backend && poetry run ruff format . --force-exclude'
        language: system
